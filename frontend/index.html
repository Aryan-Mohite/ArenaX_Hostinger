<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══ PRIMARY SEO ══════════════════════════════════════════ -->
    <title>ArenaX — Compete. Win. Prove It. | Esports Platform</title>
    <meta
      name="description"
      content="ArenaX is the all-in-one esports platform for competitive FPS players. Join tournaments, find squadmates, watch live streams, and track your stats — all in one place."
    />
    <meta
      name="keywords"
      content="esports platform, Valorant tournaments, squad finder, FPS tournaments, competitive gaming, esports stats tracker, find teammates valorant, online gaming tournaments"
    />
    <meta name="author" content="ArenaX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://arenax.io/" />

    <!-- ══ OPEN GRAPH (Facebook, Discord, WhatsApp, LinkedIn) ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ArenaX" />
    <meta property="og:title" content="ArenaX — Compete. Win. Prove It." />
    <meta
      property="og:description"
      content="The all-in-one esports platform. Tournaments, Team finder, live streams, and Nexus Community — built for serious eSports players."
    />
    <meta property="og:url" content="https://arenax.io/" />
    <meta property="og:image" content="https://arenax.io/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="ArenaX — The esports platform. Compete. Win. Prove it."
    />
    <meta property="og:locale" content="en_US" />

    <!-- ══ TWITTER / X CARD ══════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Official_ArenaX" />
    <meta name="twitter:creator" content="@Official_ArenaX" />
    <meta name="twitter:title" content="ArenaX — Compete. Win. Prove It." />
    <meta
      name="twitter:description"
      content="The all-in-one esports platform. Tournaments, Team finder, live streams, and Nexus Community — built for serious eSports players."
    />
    <meta name="twitter:image" content="https://arenax.io/og-preview.png" />
    <meta name="twitter:image:alt" content="ArenaX esports platform" />

    <!-- ══ THEME & ICONS ════════════════════════════════════════ -->
    <meta name="theme-color" content="#ff4655" />
    <link rel="icon" type="image/svg+xml" href="/icons.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ══ STRUCTURED DATA (JSON-LD) ════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ArenaX",
        "url": "https://arenax.io",
        "description": "All-in-one esports platform for competitive FPS players — tournaments, Team finder, live streams, and Nexus Community — built for serious eSports players.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://arenax.io/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        },
        "sameAs": [
          "https://www.instagram.com/arenax_gg/",
          "https://x.com/Official_ArenaX",
          "https://www.youtube.com/@ArenaX_gg",
          "https://www.twitch.tv/arenaxxtreme"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
