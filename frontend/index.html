          Browse and register for free esports tournaments in Valorant, CS2,

          1v1, 5v5, and team brackets. Entry is free. <a href="/tournament">Browse esports tournaments</a>.
        </p>

        <p>
          Use ArenaX's team finder to find teammates for competitive FPS games. Post your
          rank, role, and availability. Browse other players looking to form squads for
          tournaments. Built for solo players who want to compete as a team.
          <a href="/teamfinder">Find teammates with our team finder</a>.
        </p>

        <ul>
          <li>Valorant</li>
          <li>CS2 (Counter-Strike 2)</li>
          <li>League of Legends</li>
          <li>Fortnite</li>
          <li>Dota 2</li>
          <li>Apex Legends</li>
        </ul>
        <p><a href="/games">Browse all games</a></p>

        <p>

        </p>
