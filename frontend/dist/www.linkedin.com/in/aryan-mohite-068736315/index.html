        </p>

          League of Legends, Fortnite, Dota 2, and Apex Legends. Formats include
          1v1, 5v5, and team brackets. Entry is free.
          <a href="/tournament">Browse esports tournaments</a>.
        </p>

        <p>
          Use ArenaX's team finder to find teammates for competitive FPS games.
          Post your rank, role, and availability. Browse other players looking
          to form squads for tournaments. Built for solo players who want to
          compete as a team.
          <a href="/teamfinder">Find teammates with our team finder</a>.
        </p>

          <li>CS2 (Counter-Strike 2)</li>
          <li>League of Legends</li>
          <li>Fortnite</li>
          <li>Dota 2</li>
          <li>Apex Legends</li>
        </ul>
        <p><a href="/games">Browse all games</a></p>

        <h2>Live Streams</h2>
        <p>
          Watch live esports streams from active tournaments and community
          players directly on ArenaX. <a href="/stream">Watch streams</a>.
        </p>

        <h2>Communities — The Nexus</h2>
        <p>
          Join game-specific communities, find events, and connect with
          competitive players. ArenaX's Nexus is a focused community hub built

          <a href="/communities">Join communities</a>.
